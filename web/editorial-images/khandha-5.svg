<svg xmlns="http://www.w3.org/2000/svg" width="560" height="240" viewBox="0 0 560 240" font-family="'Noto Serif Thai', serif">
  <rect width="560" height="240" rx="14" fill="#faf7f0" stroke="#e3dccb"/>
  <text x="280" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#2c2620">ขันธ์ ๕</text>
  <g font-size="15" fill="#fff" text-anchor="middle">
    <g><rect x="24"  y="80" width="96" height="90" rx="10" fill="#0d6efd"/><text x="72"  y="120">รูป</text><text x="72"  y="142" font-size="11">(กาย)</text></g>
    <g><rect x="134" y="80" width="96" height="90" rx="10" fill="#8e44ad"/><text x="182" y="120">เวทนา</text><text x="182" y="142" font-size="11">(เสวยอารมณ์)</text></g>
    <g><rect x="244" y="80" width="96" height="90" rx="10" fill="#1e8449"/><text x="292" y="120">สัญญา</text><text x="292" y="142" font-size="11">(จำได้)</text></g>
    <g><rect x="354" y="80" width="96" height="90" rx="10" fill="#c0392b"/><text x="402" y="120">สังขาร</text><text x="402" y="142" font-size="11">(ปรุงแต่ง)</text></g>
    <g><rect x="464" y="80" width="72" height="90" rx="10" fill="#b8860b"/><text x="500" y="120">วิญญาณ</text><text x="500" y="142" font-size="11">(รู้แจ้ง)</text></g>
  </g>
  <text x="280" y="206" text-anchor="middle" font-size="13" fill="#7a7263">นาม = เวทนา · สัญญา · สังขาร · วิญญาณ   |   รูป = ร่างกาย</text>
</svg>
